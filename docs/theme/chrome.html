<!-- Fonts + chrome CSS for the injected site header/footer.
     Injected into <head> via include-in-header. -->
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<style>
  @font-face {
    font-family: 'Playfair Display';
    font-style: normal;
    font-weight: 400 900;
    font-display: swap;
    src: url('https://fonts.gstatic.com/s/playfairdisplay/v37/nuFvD-vYSZviVYUb_rj3ij__anPXJzDwcbmjWBN2PKd3vXDXbtM.woff2') format('woff2');
  }
  @font-face {
    font-family: 'Source Sans 3';
    font-style: normal;
    font-weight: 300 700;
    font-display: swap;
    src: url('https://fonts.gstatic.com/s/sourcesans3/v15/nwpBtKy2OAdR1K-IwhWudF-R9QMylBJAV3Bo8Ky462EN_io6npfB.woff2') format('woff2');
  }
  @font-face {
    font-family: 'JetBrains Mono';
    font-style: normal;
    font-weight: 400 700;
    font-display: swap;
    src: url('https://fonts.gstatic.com/s/jetbrainsmono/v18/tDbY2o-flEEny0FZhsfKu5WU4zr3E_BX0PnT8RD8yKxjPVmUsaaDhw.woff2') format('woff2');
  }

  /* Site header — stretch full-width so Quarto's right TOC can't collide
     with the socials, and force it above the sidebar sticky stack. */
  .wn-site-header {
    position: sticky;
    top: 0;
    z-index: 1050;
    width: 100%;
    background: rgba(254, 253, 248, 0.92);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(15, 23, 42, 0.06);
  }
  .wn-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    max-width: none;
    margin: 0;
    padding: 0.75rem 2rem;
    gap: 1.5rem;
  }
  .wn-logo-link {
    display: flex;
    align-items: center;
    text-decoration: none;
    color: var(--whatnut-ink, #0f172a);
    flex: 0 0 auto;
    white-space: nowrap;
  }
  .wn-logo-text {
    font-family: 'Playfair Display', Georgia, serif;
    font-size: 1.25rem;
    font-weight: 700;
    letter-spacing: -0.02em;
    white-space: nowrap;
  }
  .wn-nav-links {
    display: flex;
    gap: 0.25rem;
    flex: 1;
    justify-content: center;
  }
  .wn-nav-link {
    padding: 0.5rem 0.9rem;
    font-family: 'Source Sans 3', sans-serif;
    font-size: 0.95rem;
    font-weight: 500;
    color: var(--whatnut-ink-soft, #334155);
    text-decoration: none;
    border-radius: 8px;
    transition: all 150ms cubic-bezier(0.16, 1, 0.3, 1);
  }
  .wn-nav-link:hover {
    color: var(--whatnut-ink, #0f172a);
    background: rgba(15, 23, 42, 0.04);
  }
  .wn-social-links {
    display: flex;
    gap: 0.25rem;
  }
  .wn-social-links a {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 36px;
    height: 36px;
    color: var(--whatnut-ink-muted, #64748b);
    border-radius: 8px;
    transition: all 150ms cubic-bezier(0.16, 1, 0.3, 1);
  }
  .wn-social-links a:hover {
    color: var(--whatnut-amber-dark, #d97706);
    background: var(--whatnut-amber-glow, rgba(245, 158, 11, 0.15));
  }
  @media (max-width: 768px) {
    .wn-nav { padding: 0.75rem 1rem; }
    .wn-nav-links { display: none; }
    .wn-social-links { gap: 0; }
  }

  /* Site footer */
  .wn-site-footer {
    margin-top: 4rem;
    background: var(--whatnut-ink, #0f172a);
    color: #fff;
    font-family: 'Source Sans 3', sans-serif;
  }
  .wn-footer-container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 3rem 2rem 1.5rem;
    display: grid;
    grid-template-columns: 1fr 2fr;

  .wn-footer-main .wn-footer-name {
    font-family: 'Playfair Display', Georgia, serif;
    font-size: 1.5rem;
    font-weight: 700;
    display: block;
    margin-bottom: 0.5rem;
  }
  .wn-footer-tagline {
    color: rgba(255, 255, 255, 0.7);
    margin: 0;
  }
  .wn-footer-links {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 2rem;
  }
  .wn-footer-column h4 {
    color: #fff;
    font-family: 'Source Sans 3', sans-serif;
    font-size: 0.875rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin: 0 0 1rem;
  }
  .wn-footer-column a {
    display: block;
    padding: 0.25rem 0;
    color: rgba(255, 255, 255, 0.7);
    text-decoration: none;
    transition: color 150ms cubic-bezier(0.16, 1, 0.3, 1);
  }
  .wn-footer-column a:hover {
    color: var(--whatnut-amber, #f59e0b);
  }
  .wn-footer-bottom {
    max-width: 1200px;
    margin: 0 auto;
    padding: 1.5rem 2rem;
    border-top: 1px solid rgba(255, 255, 255, 0.08);
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 0.875rem;
    color: rgba(255, 255, 255, 0.5);
  }
  .wn-source-link {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    color: rgba(255, 255, 255, 0.7);
    text-decoration: none;
  }
  .wn-source-link:hover { color: var(--whatnut-amber, #f59e0b); }
  @media (max-width: 768px) {
    .wn-footer-container { grid-template-columns: 1fr; gap: 2rem; }
    .wn-footer-links { grid-template-columns: repeat(2, 1fr); }
    .wn-footer-bottom { flex-direction: column; gap: 0.5rem; }
  }

  /* Keep Quarto's sticky right TOC below the sticky site header so the
     "On this page" title doesn't slide under the socials. Quarto sets
     the TOC position via --bs-body-... tokens, but the simplest fix is a
     hard top offset sized to match the header. */
  #quarto-margin-sidebar,
  nav#TOC,
  .sidebar.margin-sidebar {
    top: 4.5rem !important;
  }
  @media (max-width: 768px) {
    #quarto-margin-sidebar,
    nav#TOC,
    .sidebar.margin-sidebar {
      top: 3.75rem !important;
    }
  }
</style>
