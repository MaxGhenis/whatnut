# Nutrient-pathway priors for Monte Carlo uncertainty propagation
# Each prior is Normal(mean, sd) for log-RR per unit nutrient
# Organized by mortality pathway
#
# Key scientific decisions:
# - ALA CVD prior: -0.07/g (Naghshi 2021: RR 0.90 for ~1.5g/day → -0.07/g)
# - Single confounding prior: Beta(2.5, 2.5) mean 0.50
# - Tau (hierarchical shrinkage): HalfNormal(0.03)

nutrients:
  - ala_omega3
  - omega6
  - omega7
  - fiber
  - saturated_fat
  - magnesium
  - arginine
  - vitamin_e
  - phytosterols
  - protein

pathways:
  - cvd
  - cancer
  - other

cvd:
  ala_omega3:
    mean: -0.07
    sd: 0.03
    unit: g
    source: "Naghshi 2021 (BMJ): RR 0.90 for ~1.5g/day ALA intake → -0.07/g"
  omega6:
    mean: -0.005
    sd: 0.003
    unit: g
    source: "Farvid 2014: CHD benefit from linoleic acid"
  omega7:
