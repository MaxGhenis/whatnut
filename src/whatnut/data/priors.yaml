# Confounding prior
# Single canonical prior: Beta(2.5, 2.5) with mean 0.50
# Symmetric, weakly informative; 95% CI [0.12, 0.88]
# Reflects genuine uncertainty about causal fraction
confounding:
  alpha: 2.5
  beta: 2.5
  mean: 0.50
  ci_lower: 0.12
  ci_upper: 0.88
  rationale: >
    Symmetric, weakly informative prior reflecting genuine uncertainty.
    Evidence sources: LDL pathway floor (~12%), sibling comparison
    attenuation (50-70%), Golestan cohort persistence (HR 0.71).
    Sensitivity analyses with Beta(1.5, 4.5) mean 0.25 (skeptical)
    and Beta(3, 1) mean 0.75 (optimistic) reported in Discussion.

# Hierarchical shrinkage prior
# tau ~ HalfNormal(sigma) per pathway
# Controls nut-specific deviations from nutrient-predicted effects
tau:
  sigma: 0.03
  rationale: >
    Constrains nut-specific deviations to ~±6% on log-RR scale (2 SD).
    Calibrated: 0.01 produces excessive shrinkage; 0.10 produces
    implausibly wide variation. 0.03 allows walnuts to differ from
    almonds by ~10-15%, matching RCT residual effects.
