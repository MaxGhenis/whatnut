# Nut profiles: nutrients (auto-generated), pathway adjustments,
# costs, and evidence.
# - Nutrients: USDA SR Legacy, per 28 g serving, scaled from
#   per-100 g values by the extraction script in
#   src/whatnut/data_build/usda_fdc.py. Raw per-food JSON
#   snapshots live under src/whatnut/data/raw/usda_fdc/.
# - Phytosterols: Phillips et al. 2005, J Agric Food Chem
#   53(24):9436-9445 (SR Legacy omits phytosterols).
# - Prices: see cost_per_kg_usd comments and @whatnut2026prices.
# - pathway_adjustments: hand-curated from the nut-specific RCTs
#   cited per-adjustment; tiered publication-bias shrinkage is
#   applied at sampling time (see priors.yaml:study_quality_shrinkage).
#
# This file is the SINGLE SOURCE OF TRUTH for per-nut data.
# Regenerate nutrient sections with:
#     python -m whatnut.data_build.usda_fdc --apply

walnut:
  fdc_id: 170187
  _sr_legacy_description: Nuts, walnuts, english
  nutrients:
    calories_kcal: 183.12
    protein_g: 4.256
    total_fat_g: 18.256
    saturated_fat_g: 1.716
    monounsaturated_fat_g: 2.5
    polyunsaturated_fat_g: 13.216
    omega3_ala_g: 2.542
    omega7_g: 0.0
    fiber_g: 1.876
    magnesium_mg: 44.24
    vitamin_e_mg: 0.196
    arginine_g: 0.638
    phytosterols_mg: 20
  pathway_adjustments:
    cvd:
      mean: 1.1
      sd: 0.12
      rationale: Highest ALA omega-3; modest residual benefit beyond nutrient model
    cancer:
      mean: 1.0
      sd: 0.08
      rationale: No clear walnut-specific cancer mortality evidence
    other:
      mean: 1.0
      sd: 0.08
      rationale: No clear walnut-specific other-cause mortality evidence
  cost_per_kg_usd: 29.74
  evidence: strong
